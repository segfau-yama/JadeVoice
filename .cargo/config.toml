[target.x86_64-unknown-linux-musl]
linker = "x86_64-linux-musl-gcc"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
    "-C", "link-arg=-fuse-ld=mold",
    "-C", "link-arg=-Wl,-rpath,/workspaces/JadeVoice/voicevox_core/c_api/lib",
    "-C", "link-arg=-Wl,-rpath,/workspaces/JadeVoice/voicevox_core/onnxruntime/lib",
]
